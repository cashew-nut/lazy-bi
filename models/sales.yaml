# Semantic model: sales order lines
# `source.path` is any glob polars can scan lazily from the object store.
# Measures are written in the safe measure DSL (see README) — a small
# allowlisted expression language, not arbitrary polars/Python; each must
# reduce to a single value per group (an aggregation).
name: sales
label: Sales Orders
description: Order lines from the street markets, 2024 - mid 2026.
source:
  format: parquet
  path: s3://cash-intel/sales/*.parquet

# lookup tables joined lazily into the base scan; their columns are then
# available to dimensions and measures like any base column
joins:
  - name: products
    source:
      format: csv
      path: s3://cash-intel/ref/products.csv
    on: product        # shorthand for left_on/right_on; how defaults to left

# region comes from the `geography` common dimensional model below (not
# declared here) — importing it gains map coordinates and a territory
# rollup for free, shared with every other model that imports the same bundle
dimension_imports:
  - bundle: geography
    anchor_dataset: regions
    on: region

dimensions:
  - name: order_date
    column: order_date
    label: Order Date
    type: time
  - name: channel
    label: Sales Channel
  - name: segment
    label: Customer Segment
  - name: category
    label: Category
  - name: product
    label: Product
  - name: supplier
    label: Supplier
    description: From the products.csv join.
  - name: tier
    label: Product Tier
    description: From the products.csv join.

measures:
  - name: revenue
    label: Revenue
    format: currency
    expr: sum(unit_price * quantity)
  - name: cost
    label: Cost
    format: currency
    expr: sum(unit_cost * quantity)
  - name: profit
    label: Profit
    format: currency
    expr: sum((unit_price - unit_cost) * quantity)
  - name: margin_pct
    label: Margin %
    format: percent
    description: Profit as a share of revenue.
    expr: sum((unit_price - unit_cost) * quantity) / sum(unit_price * quantity)
  - name: orders
    label: Orders
    expr: count_distinct(order_id)
  - name: units
    label: Units Sold
    expr: sum(quantity)
  - name: aov
    label: Avg Order Value
    format: currency
    expr: sum(unit_price * quantity) / count_distinct(order_id)
  - name: avg_unit_price
    label: Avg Unit Price
    format: currency
    expr: mean(unit_price)
  - name: margin_per_unit
    label: Margin / Unit
    format: currency
    expr: sum((unit_price - unit_cost) * quantity) / sum(quantity)
  # window measures: running_total()/lag() read sibling measures' already-
  # aggregated values rather than raw columns, over(partition_by=the query's
  # other dimensions, order_by=its time dimension) — query by order_date
  # (any grain) to see these; add a breakout dimension (e.g. channel) and
  # each gets its own running total / prior-period comparison.
  - name: revenue_running_total
    label: Revenue (Running Total)
    format: currency
    description: Cumulative revenue over the query's date axis.
    expr: running_total(revenue)
  - name: revenue_pct_change
    label: Revenue % Change vs. Prior Period
    format: percent
    description: >-
      Change vs. the previous point on the query's date axis (e.g. previous
      quarter, if grouped by order_date at quarter grain).
    expr: (revenue - lag(revenue, 1)) / lag(revenue, 1)
