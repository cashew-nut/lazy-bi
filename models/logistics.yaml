# Semantic model: courier shipments — reads a Delta Lake table
name: logistics
label: Logistics
description: Courier shipments out of the warehouses, Delta Lake source.
source:
  format: delta
  path: s3://cash-intel/logistics/shipments

# region comes from the `geography` common dimensional model (see
# dimensions/geography.yaml) — shared with sales.yaml, so a region edit
# there updates both models with no changes needed here
dimension_imports:
  - bundle: geography
    anchor_dataset: regions
    on: region

dimensions:
  - name: ship_date
    label: Ship Date
    type: time
  - name: courier
    label: Courier

measures:
  - name: shipments
    label: Shipments
    expr: pl.len()
  - name: cost
    label: Shipping Cost
    format: currency
    expr: pl.col("cost").sum()
  - name: avg_delivery_hours
    label: Avg Delivery Hours
    expr: pl.col("delivery_hours").mean()
  - name: cost_per_package
    label: Cost per Package
    format: currency
    expr: pl.col("cost").sum() / pl.col("packages").sum()
