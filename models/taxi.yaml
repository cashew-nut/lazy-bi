# Semantic model: NYC yellow taxi trips (public TLC data, ~3M rows/month).
# Load data first: python -m app.load_taxi   — then restart the app.
name: taxi
label: NYC Taxi
description: Yellow-cab trips, Jan-Apr 2024 (13M rows) — large fact table benchmark.
source:
  format: parquet
  path: s3://cash-intel/taxi/*.parquet

dimensions:
  - name: pickup_at
    column: tpep_pickup_datetime
    label: Pickup Time
    type: time
  - name: payment_type
    label: Payment Type
    description: TLC code — 1 card, 2 cash.
  - name: passenger_count
    label: Passengers
  - name: vendor
    column: VendorID
    label: Vendor

measures:
  - name: trips
    label: Trips
    expr: pl.len()
  - name: revenue
    label: Revenue
    format: currency
    expr: pl.col("total_amount").sum()
  - name: avg_fare
    label: Avg Fare
    format: currency
    expr: pl.col("fare_amount").mean()
  - name: avg_distance
    label: Avg Distance (mi)
    expr: pl.col("trip_distance").mean()
  - name: tip_pct
    label: Tip %
    format: percent
    description: Tips as a share of fares (card tips only in the data).
    expr: pl.col("tip_amount").sum() / pl.col("fare_amount").sum()
