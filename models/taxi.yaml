# Generated by the Modelling workspace form. Editing this file by hand is
# fine — but a later save from the form rewrites it (comments included).
name: taxi
label: NYC Taxi
description: Yellow-cab trips, Jan-Apr 2024 (13M rows) — large fact table benchmark.
source:
  format: parquet
  path: s3://cash-intel/taxi/*.parquet
dimensions:
- name: pickup_at
  column: tpep_pickup_datetime
  label: Pickup Time
  type: time
- name: payment_type
  label: Payment Type
  description: TLC code — 1 card, 2 cash.
- name: passenger_count
  label: Passengers
- name: vendor
  column: VendorID
  label: Vendor
- name: active_trips
  label: Active At
  type: time
  spine:
    start: tpep_pickup_datetime
    end: tpep_dropoff_datetime
measures:
- name: trips
  label: Trips
  expr: count()
- name: revenue
  label: Revenue
  format: currency
  expr: sum(total_amount)
- name: avg_fare
  label: Avg Fare
  format: currency
  expr: mean(fare_amount)
- name: avg_distance
  label: Avg Distance (mi)
  expr: mean(trip_distance)
- name: tip_pct
  label: Tip %
  format: percent
  description: Tips as a share of fares (card tips only in the data).
  expr: sum(tip_amount) / sum(fare_amount)
