name: clinops_common_dimensions
label: Clinops Common Dimensions
description: Commonly Reused Dimensions
datasets:
- name: sites
  source:
    format: parquet
    path: s3://cash-intel/clinical-ops-synthetic/sites.parquet
  dimensions:
  - name: site_name
    label: Site Name
  - name: country
    label: Country
  - name: principal_investigator
    label: Principal Investigator
  - name: planned_activation_date
    label: Planned Activation Date
    type: time
  - name: actual_activation_date
    label: Actual Activation Date
    type: time
  - name: site_status
    label: Site Status
  joins:
  - to: studies
    on: study_id
- name: studies
  source:
    format: csv
    path: s3://cash-intel/clinical-ops-synthetic/studies.csv
  dimensions:
  - name: study_id
    label: Study Id
  - name: study_title
    label: Study Title
  - name: sponsor
    label: Sponsor
  - name: indication
    label: Indication
  - name: phase
    label: Phase
  - name: status
    label: Status
  - name: planned_start_date
    label: Planned Start Date
  - name: actual_start_date
    label: Actual Start Date
  - name: planned_primary_completion_date
    label: Planned Primary Completion Date
  - name: actual_primary_completion_date
    label: Actual Primary Completion Date
  - name: planned_study_completion_date
    label: Planned Study Completion Date
  - name: actual_study_completion_date
    label: Actual Study Completion Date
  - name: target_enrollment
    label: Target Enrollment
  - name: actual_enrollment
    label: Actual Enrollment
  - name: num_sites
    label: Num Sites
  - name: num_countries
    label: Num Countries
- name: calendar
  source:
    format: parquet
    path: s3://cash-intel/clinical-ops-synthetic/gold/calendar.parquet
  dimensions:
  - name: date
    label: Date
    type: time
