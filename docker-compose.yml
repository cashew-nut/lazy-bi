# Two ways to run:
#   docker compose up                      -> demo mode (embedded S3 emulator) on :8080
#   docker compose --profile minio up      -> also starts MinIO + a second app
#                                             on :8081 backed by it
# First start prints the bootstrap admin's one-time password in the compose
# output — accounts live in the app-data volume, so it never reprints.
# Behind a TLS proxy, pass CI_COOKIE_SECURE=1 (and optionally
# CI_SESSION_IDLE_DAYS / CI_SESSION_MAX_DAYS) via `environment:`.
# Conversational analytics (specs/012-conversational-analytics/) is off
# unless CI_LLM_API_KEY is set — pass it (and optionally CI_LLM_MODEL) via
# `environment:` to enable it. See the README's "Conversational analytics"
# section for exactly what that sends to the configured LLM provider, and
# for CI_LLM_PROXY / CI_LLM_CA_BUNDLE if that provider is only reachable
# through a corporate TLS-inspecting proxy (e.g. Zscaler) — a CA bundle path
# needs its own volume mount here to be reachable inside the container.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - app-data:/data              # sqlite: visuals, dashboards, users, sessions
      - ./models:/srv/models        # edit semantic models from the host, live
      - ./pipelines:/srv/pipelines  # pipeline definitions, editable live too
      - ./data_cache:/srv/data_cache:ro  # optional big datasets (app/load_taxi.py)

  minio:
    profiles: ["minio"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cashintel
      MINIO_ROOT_PASSWORD: cashintel-secret
    ports:
      - "9000:9000"
      - "9001:9001"                 # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-minio:
    profiles: ["minio"]
    build: .
    ports:
      - "8081:8080"
    environment:
      CI_S3_ENDPOINT: http://minio:9000   # disables the embedded emulator
      AWS_ACCESS_KEY_ID: cashintel
      AWS_SECRET_ACCESS_KEY: cashintel-secret
    volumes:
      - app-data:/data
      - ./models:/srv/models
      - ./pipelines:/srv/pipelines
      - ./data_cache:/srv/data_cache:ro
    depends_on:
      minio:
        condition: service_healthy

volumes:
  app-data:
  minio-data:
